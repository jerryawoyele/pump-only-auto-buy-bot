# Change this app name before first deploy, or let `fly launch` generate one.
app = "pump-only-auto-buy-bot"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "5s"
min_machines_running = 0

[build]

[processes]
  worker = "npm run worker"

[env]
  NODE_ENV = "production"
  DRY_RUN = "false"
  AUTO_BUY_ENABLED = "true"
  LISTENER_STATE_PATH = "/data/pump-listener.json"

[mounts]
  source = "pump_state"
  destination = "/data"

[[vm]]
  processes = ["worker"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
